<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiosk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  height:100vh;
  overflow:hidden;
  background:#fff8e1;
}

/* START */
#start{
  position:fixed;inset:0;
  background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),
  url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  color:white;cursor:pointer;
}
#start h1{font-size:70px;color:#ffcc00}

/* APP */
#app{display:none;height:100vh;flex-direction:row}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:#e53935;
  color:white;
  padding:10px;
  display:flex;
  flex-direction:column;
}
.cat{
  padding:12px;
  margin:5px 0;
  background:rgba(255,255,255,.15);
  border-radius:10px;
  cursor:pointer;
}
.cat.active{
  background:#ffcc00;
  color:#000;
  font-weight:bold;
}

/* MAIN */
#main{
  flex:3;
  padding:10px;
  overflow:auto;
}
.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{width:100%;height:90px;object-fit:cover}

.card h4{padding:5px;font-size:13px}
.card small{padding:0 5px;display:block;color:#666}

.best{
  background:gold;
  font-size:10px;
  padding:2px 6px;
  border-radius:5px;
  display:inline-block;
  margin:5px;
}

.card button{
  width:100%;
  padding:8px;
  background:#e53935;
  color:white;
  border:none;
  cursor:pointer;
}

/* CART */
#cart{
  width:280px;
  background:white;
  border-left:2px solid #eee;
  padding:10px;
}
.item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
  font-size:12px;
}
.total{
  margin-top:10px;
  font-weight:bold;
  color:#e53935;
}

.checkout{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  margin-top:10px;
}

/* CHECKOUT */
#checkout{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
  url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;
}
.receipt{
  background:white;
  padding:30px 25px;
  border-radius:18px;
  width:340px;
  text-align:center;
  line-height:1.6;
  animation:fade .5s ease;
}
.receipt h2{
  color:#e53935;
  margin-bottom:12px;
  font-size:24px;
  letter-spacing:1px;
}
.receipt p{
  margin:6px 0;
  font-size:14px;
}

#receipt p{
  margin:4px 0;
  font-size:13px;
}

.receipt .summary{
  margin:10px 0;
  font-weight:bold;
  font-size:15px;
  letter-spacing:0.5px;
}

.receipt .footer{
  margin-top:15px;
  font-size:13px;
  color:green;
  line-height:1.4;
}
.homeBtn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}

.homeBtn:hover{
  background:#ffb300;
}
</style>
</head>

<body>

<div id="start">
  <h1>Kalan-an ni?</h1>
  <p>Tap to Start</p>
</div>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="cat active" onclick="setCat('Budget Meals')">Budget Meals</div>
  <div class="cat" onclick="setCat('Mix & Match')">Mix & Match</div>
  <div class="cat" onclick="setCat('Fries')">Fries</div>
  <div class="cat" onclick="setCat('Burgers')">Burgers</div>
  <div class="cat" onclick="setCat('Pizza')">Pizza</div>
  <div class="cat" onclick="setCat('Drinks')">Drinks</div>
  <div class="cat" onclick="setCat('Desserts')">Desserts</div>
</div>

<!-- MAIN -->
<div id="main">
<input class="search" placeholder="Search food..." oninput="search(this.value)">
<div class="grid" id="grid"></div>
</div>

<!-- CART -->
<div id="cart">
<h3>Your Order</h3>
<div id="cartList"></div>

<div class="total">
Total: ₱<span id="total">0</span><br>
Calories: <span id="cal">0</span> kcal
</div>

<button class="checkout" onclick="checkout()">CHECKOUT</button>
</div>

</div>

<!-- CHECKOUT -->
<div id="checkout">
<div class="receipt">

<h2>THANK YOU!</h2>

<div class="summary">ORDER SUMMARY</div>

<div id="receipt"></div>

<br>

<p><b>Total:</b> ₱<span id="fTotal"></span></p>
<p><b>Calories:</b> <span id="fCal"></span> kcal</p>

<div class="footer">
THANK YOU FOR ORDERING AT<br>
Kalan-an ni?
</div>

<button class="homeBtn" onclick="backHome()">BACK TO HOME</button>

</div>
</div>

let cart=[];
let current="Budget Meals";

function render(){
let g=document.getElementById("grid");
g.innerHTML="";
data.filter(i=>i.cat==current).forEach(i=>{
g.innerHTML+=`
<div class="card">
${i.best?'<span class="best">BEST</span>':''}
<img src="${i.img}">
<h4>${i.name}</h4>
<small>₱${i.price} | ${i.cal} kcal</small>
<button onclick="add('${i.name}')">ADD</button>
</div>`;
});
}

function setCat(c){
current=c;
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
render();
}

function add(name){
let item=data.find(i=>i.name==name);
let f=cart.find(i=>i.name==name);
if(f)f.qty++;
else cart.push({...item,qty:1});
update();
}

function update(){
let c=document.getElementById("cartList");
c.innerHTML="";
let t=0,k=0;

cart.forEach(i=>{
t+=i.price*i.qty;
k+=i.cal*i.qty;

c.innerHTML+=`
<div class="item">
<div>${i.name} x${i.qty}</div>
<div class="qty">
<button onclick="change('${i.name}',-1)">-</button>
<button onclick="change('${i.name}',1)">+</button>
</div>
</div>`;
});

document.getElementById("total").innerText=t;
document.getElementById("cal").innerText=k;
}

function change(n,v){
let i=cart.find(x=>x.name==n);
i.qty+=v;
if(i.qty<=0)cart=cart.filter(x=>x.name!=n);
update();
}

function search(v){
render();
document.querySelectorAll(".card").forEach(c=>{
if(!c.innerText.toLowerCase().includes(v.toLowerCase()))
c.style.display="none";
});
}

function checkout(){
document.getElementById("checkout").style.display="flex";
let r=document.getElementById("receipt");
r.innerHTML="";
let t=0,k=0;

cart.forEach(i=>{
t+=i.price*i.qty;
k+=i.cal*i.qty;
r.innerHTML+=`<p>${i.name} x${i.qty}</p>`;
});

document.getElementById("fTotal").innerText=t;
document.getElementById("fCal").innerText=k;

cart=[];
update();
}

/* BACK TO HOME */
function backHome(){
document.getElementById("checkout").style.display="none";
document.getElementById("app").style.display="none";
document.getElementById("start").style.display="flex";
cart=[];
update();
}

document.getElementById("start").onclick=()=>{
document.getElementById("start").style.display="none";
document.getElementById("app").style.display="flex";
render();
};

</script>
